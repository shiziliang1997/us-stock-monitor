name: Daily US Stock Monitor

on:
  schedule:
    # 北京时间 09:00，完整日报
    - cron: "0 1 * * 1-5"

    # 北京时间 22:25 / 22:30 / 22:35 / 22:40，冗余触发晚间风险扫描
    - cron: "25 14 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "35 14 * * 1-5"
    - cron: "40 14 * * 1-5"

  workflow_dispatch:

jobs:
  run-stock-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run stock monitor
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          GITHUB_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python stock_monitor.py
